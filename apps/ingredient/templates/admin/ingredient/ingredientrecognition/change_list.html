{% extends "admin/change_list.html" %}
{% load i18n %}

{% block content_title %}
{{ block.super }}

{# 识别统计面板 #}
<div style="margin: 16px 0; padding: 16px; background: #fff; border: 1px solid #ddd; border-radius: 4px;">
  <h3 style="margin: 0 0 12px 0; font-size: 14px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 8px;">
    🔍 食材识别统计
  </h3>
  <div style="display: flex; gap: 16px; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 140px; padding: 14px 18px; background: #f0f7ff; border: 1px solid #b8d4f0; border-radius: 4px; text-align: center;">
      <div style="font-size: 28px; font-weight: bold; color: #417690;">{{ total_recognitions }}</div>
      <div style="font-size: 12px; color: #666; margin-top: 4px;">识别总次数</div>
    </div>
    <div style="flex: 1; min-width: 140px; padding: 14px 18px; background: #f0fff4; border: 1px solid #a3d9b4; border-radius: 4px; text-align: center;">
      <div style="font-size: 28px; font-weight: bold; color: #27ae60;">{{ success_count }}</div>
      <div style="font-size: 12px; color: #666; margin-top: 4px;">成功识别次数</div>
    </div>
    <div style="flex: 1; min-width: 140px; padding: 14px 18px; background: #fffbf0; border: 1px solid #f0d898; border-radius: 4px; text-align: center;">
      <div style="font-size: 28px; font-weight: bold; color: #e67e22;">{{ success_rate }}</div>
      <div style="font-size: 12px; color: #666; margin-top: 4px;">识别成功率</div>
    </div>
  </div>
</div>
{% endblock %}
